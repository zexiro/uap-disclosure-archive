<!doctype html>
<html><head><meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 800px; height: 800px; overflow: hidden; background: #000; }
  .wrap {
    position: relative; width: 800px; height: 800px;
    background:
      radial-gradient(ellipse at 50% 50%, #2a2a2a 0%, #0a0a0a 80%);
    display: flex; align-items: center; justify-content: center;
    color: #d8d8d8;
  }
  .grain {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
    pointer-events: none;
  }
  .corners {
    position: absolute; inset: 80px; pointer-events: none;
  }
  .corners::before, .corners::after,
  .corners > .tl, .corners > .tr {
    content: ''; position: absolute;
    width: 80px; height: 80px;
    border: 4px solid #d8d8d8;
  }
  .corners::before { top: 0; left: 0; border-right: none; border-bottom: none; }
  .corners::after  { bottom: 0; right: 0; border-left: none; border-top: none; }
  .corners > .tl   { top: 0; right: 0; border-left: none; border-bottom: none; }
  .corners > .tr   { bottom: 0; left: 0; border-right: none; border-top: none; }
  svg { width: 540px; height: 540px; position: relative; z-index: 2; }
  .label {
    position: absolute; top: 36px; left: 50%; transform: translateX(-50%);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 22px; letter-spacing: 6px; color: #ff5757;
    text-shadow: 0 0 12px rgba(255,87,87,0.6);
    z-index: 3;
  }
  .timestamp {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 18px; letter-spacing: 4px; color: #d8d8d8; opacity: 0.85;
    z-index: 3;
  }
</style>
</head><body><div class="wrap">
  <div class="grain"></div>
  <div class="corners"><div class="tl"></div><div class="tr"></div></div>
  <div class="label">● REC · UAP · MIRROR</div>
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Center crosshair -->
    <line x1="100" y1="40" x2="100" y2="80" stroke="#d8d8d8" stroke-width="2.5"/>
    <line x1="100" y1="120" x2="100" y2="160" stroke="#d8d8d8" stroke-width="2.5"/>
    <line x1="40" y1="100" x2="80" y2="100" stroke="#d8d8d8" stroke-width="2.5"/>
    <line x1="120" y1="100" x2="160" y2="100" stroke="#d8d8d8" stroke-width="2.5"/>
    <!-- Crosshair endpoint ticks -->
    <line x1="95" y1="40" x2="105" y2="40" stroke="#d8d8d8" stroke-width="2.5"/>
    <line x1="95" y1="160" x2="105" y2="160" stroke="#d8d8d8" stroke-width="2.5"/>
    <line x1="40" y1="95" x2="40" y2="105" stroke="#d8d8d8" stroke-width="2.5"/>
    <line x1="160" y1="95" x2="160" y2="105" stroke="#d8d8d8" stroke-width="2.5"/>
    <!-- Range ticks horizontal -->
    <line x1="60" y1="100" x2="60" y2="106" stroke="#d8d8d8" stroke-width="1.5"/>
    <line x1="70" y1="100" x2="70" y2="106" stroke="#d8d8d8" stroke-width="1.5"/>
    <line x1="130" y1="100" x2="130" y2="106" stroke="#d8d8d8" stroke-width="1.5"/>
    <line x1="140" y1="100" x2="140" y2="106" stroke="#d8d8d8" stroke-width="1.5"/>
    <!-- Tracked target (the UAP) -->
    <circle cx="118" cy="92" r="5" fill="#ff5757"/>
    <circle cx="118" cy="92" r="14" fill="none" stroke="#ff5757" stroke-width="1.5" opacity="0.7"/>
    <circle cx="118" cy="92" r="22" fill="none" stroke="#ff5757" stroke-width="1" opacity="0.4"/>
  </svg>
  <div class="timestamp">2026-05-08 · DECLASSIFIED</div>
</div></body></html>
