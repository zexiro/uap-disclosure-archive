<!doctype html>
<html><head><meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 800px; height: 800px; overflow: hidden; background: #0b0e14; }
  .wrap {
    position: relative; width: 800px; height: 800px;
    background:
      radial-gradient(circle at 50% 35%, #1a2742 0%, #0b0e14 60%),
      #0b0e14;
    display: flex; align-items: center; justify-content: center;
  }
  .stars { position: absolute; inset: 0; pointer-events: none; }
  .stars span {
    position: absolute; background: #fff; border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
  }
  svg { width: 620px; height: 620px; position: relative; z-index: 2; }
</style>
</head><body><div class="wrap">
  <div class="stars">
    <span style="left:120px;top:90px;width:3px;height:3px"></span>
    <span style="left:680px;top:140px;width:4px;height:4px"></span>
    <span style="left:220px;top:200px;width:2px;height:2px"></span>
    <span style="left:600px;top:260px;width:3px;height:3px"></span>
    <span style="left:80px;top:300px;width:2px;height:2px"></span>
    <span style="left:720px;top:380px;width:3px;height:3px"></span>
    <span style="left:160px;top:600px;width:2px;height:2px"></span>
    <span style="left:660px;top:680px;width:3px;height:3px"></span>
    <span style="left:380px;top:90px;width:2px;height:2px"></span>
  </div>
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Beam below saucer -->
    <defs>
      <linearGradient id="beam" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#57c7ff" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#57c7ff" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="dome" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#a8e3ff"/>
        <stop offset="60%" stop-color="#57c7ff"/>
        <stop offset="100%" stop-color="#1f6f95"/>
      </radialGradient>
      <linearGradient id="hull" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#ffe88a"/>
        <stop offset="50%" stop-color="#ffd34d"/>
        <stop offset="100%" stop-color="#7a5e1f"/>
      </linearGradient>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffd34d" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#ffd34d" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <!-- Halo glow -->
    <circle cx="100" cy="105" r="80" fill="url(#glow)"/>
    <!-- Beam -->
    <polygon points="60,115 140,115 175,180 25,180" fill="url(#beam)"/>
    <!-- Hull (saucer body) -->
    <ellipse cx="100" cy="115" rx="78" ry="14" fill="url(#hull)" stroke="#3a2a08" stroke-width="1.5"/>
    <ellipse cx="100" cy="113" rx="78" ry="3" fill="rgba(255,255,255,0.5)"/>
    <!-- Lights -->
    <circle cx="55" cy="118" r="2.5" fill="#ff5757"/>
    <circle cx="80" cy="120" r="2.5" fill="#ffd34d"/>
    <circle cx="105" cy="120" r="2.5" fill="#57c7ff"/>
    <circle cx="130" cy="120" r="2.5" fill="#ffd34d"/>
    <circle cx="148" cy="118" r="2.5" fill="#ff5757"/>
    <!-- Dome -->
    <ellipse cx="100" cy="98" rx="38" ry="22" fill="url(#dome)" stroke="#1a4a66" stroke-width="1.5"/>
    <ellipse cx="92" cy="92" rx="14" ry="6" fill="rgba(255,255,255,0.4)"/>
  </svg>
</div></body></html>
