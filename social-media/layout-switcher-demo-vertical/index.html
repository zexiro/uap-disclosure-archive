<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: #05070A;
        font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, Consolas, monospace;
        color: #cbd5e1;
      }
      .scanlines {
        position: absolute; inset: 0; pointer-events: none; z-index: 100;
        background-image: repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.018) 0px,
          rgba(255,255,255,0.018) 1px,
          transparent 1px,
          transparent 3px
        );
      }
      .vignette {
        position: absolute; inset: 0; pointer-events: none; z-index: 99;
        background: radial-gradient(
          ellipse at center,
          rgba(0,0,0,0) 50%,
          rgba(0,0,0,0.55) 100%
        );
      }
      .scene {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 80px 60px;
      }

      /* Scene 1 */
      .s1-eyebrow {
        font-size: 26px; color: #7c8aa1; letter-spacing: 0.18em;
        text-transform: uppercase; margin-bottom: 56px; text-align: center;
        line-height: 1.6;
      }
      .s1-eyebrow .stack { display: block; }
      .s1-eyebrow .sep { color: #ffd34d; }
      .s1-title {
        font-size: 130px; font-weight: 700; color: #57c7ff;
        letter-spacing: 0.02em; line-height: 1.05;
      }
      .s1-tagline {
        margin-top: 50px; font-size: 26px; color: #cbd5e1;
        letter-spacing: 0.06em; text-align: center; max-width: 920px;
        line-height: 1.5;
      }

      /* Scene 2 */
      .s2-stage { position: absolute; inset: 0; }
      .graph-svg {
        position: absolute; left: 50%; top: 44%;
        transform: translate(-50%, -50%);
        width: 1000px; height: 1000px;
      }
      .layout-pill-row {
        position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
        max-width: 960px; z-index: 5;
      }
      .layout-pill {
        font-size: 22px; letter-spacing: 0.14em; text-transform: uppercase;
        padding: 14px 28px; border: 1px solid #1f2937; border-radius: 8px;
        color: #7c8aa1;
      }
      .layout-pill.active {
        color: #57c7ff; border-color: #57c7ff; background: #0d1422;
      }
      .layout-pill .dot {
        display: inline-block; width: 9px; height: 9px; border-radius: 50%;
        background: #7c8aa1; margin-right: 12px; vertical-align: 1px;
      }
      .layout-pill.active .dot { background: #57c7ff; }

      .s2-headline {
        position: absolute; left: 0; right: 0; bottom: 280px;
        text-align: center; color: #57c7ff; font-size: 78px;
        font-weight: 700; letter-spacing: 0.04em;
      }
      .s2-sub {
        position: absolute; left: 0; right: 0; bottom: 200px;
        text-align: center; color: #cbd5e1; font-size: 26px;
        letter-spacing: 0.06em; line-height: 1.4;
        padding: 0 60px;
      }
      .s2-sub .v { color: #ffd34d; }

      .year-ruler {
        position: absolute; left: 50%; top: 44%; transform: translate(-50%, -50%);
        width: 1000px; height: 1000px; pointer-events: none;
        opacity: 0;
      }
      .year-ruler line { stroke: #1a2533; stroke-width: 1; }
      .year-ruler text {
        font-family: ui-monospace, monospace; fill: #4a5568;
        font-size: 22px; letter-spacing: 0.06em;
      }

      /* Scene 3 */
      .s3-url {
        font-size: 78px; color: #57c7ff; font-weight: 700;
        letter-spacing: 0.02em;
        position: relative; padding-bottom: 14px;
        text-align: center;
      }
      .s3-url-underline {
        position: absolute; left: 0; bottom: 0; height: 4px;
        background: #ffd34d; transform-origin: left center;
        transform: scaleX(0); width: 100%;
      }
      .s3-route {
        margin-top: 32px; font-size: 30px; color: #7c8aa1;
        letter-spacing: 0.06em;
      }
      .s3-tag {
        margin-top: 80px; font-size: 22px; color: #ffd34d;
        letter-spacing: 0.22em; text-transform: uppercase;
      }

      .edge { stroke: #57c7ff; stroke-width: 1; opacity: 0; }
      .node { opacity: 0; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1080"
      data-height="1920"
      style="position: relative; width: 1080px; height: 1920px; background: #05070A;"
    >
      <div id="scene-1" class="clip scene" data-start="0" data-duration="2.7" data-track-index="1">
        <div class="s1-eyebrow">
          <span>UFO/UAP DISCLOSURE ARCHIVE</span><span class="stack"><span class="sep">/</span> graph view</span>
        </div>
        <div class="s1-title">LAYOUT MODES</div>
        <div class="s1-tagline">Force · Radial · Chronological — same graph, three lenses</div>
      </div>

      <div id="scene-2" class="clip scene s2-stage" data-start="2.5" data-duration="9.5" data-track-index="2">
        <div class="layout-pill-row">
          <span class="layout-pill" id="pill-force"><span class="dot"></span>FORCE</span>
          <span class="layout-pill" id="pill-radial"><span class="dot"></span>RADIAL</span>
          <span class="layout-pill" id="pill-chrono"><span class="dot"></span>CHRONO</span>
        </div>
        <svg class="graph-svg" viewBox="-500 -500 1000 1000" preserveAspectRatio="xMidYMid meet">
          <g id="g-edges"></g>
          <g id="g-nodes"></g>
        </svg>
        <svg class="year-ruler" id="year-ruler" viewBox="-500 -500 1000 1000" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="s2-headline" id="s2-headline">FORCE</div>
        <div class="s2-sub" id="s2-sub">Spring-and-charge layout · clusters emerge organically</div>
      </div>

      <div id="scene-3" class="clip scene" data-start="11.8" data-duration="3.2" data-track-index="3">
        <div class="s3-url">
          uapdisclosure<wbr/>mirror.com
          <span class="s3-url-underline" id="s3-underline"></span>
        </div>
        <div class="s3-route">/ui/#view=graph</div>
        <div class="s3-tag">PERMANENT MIRROR · CC-BY</div>
      </div>

      <div class="vignette"></div>
      <div class="scanlines"></div>
    </div>

    <script>
      function mulberry32(seed) {
        return function () {
          seed |= 0;
          seed = (seed + 0x6d2b79f5) | 0;
          let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      const rng = mulberry32(20260509);
      const NODE_COUNT = 30;
      // Vertical canvas: keep field roughly square so radial fits naturally
      const FIELD_W = 880, FIELD_H = 760;
      const AGENCIES = [
        { id: "DoW",  color: "#ff6b6b", weight: 0.50 },
        { id: "FBI",  color: "#ffd34d", weight: 0.30 },
        { id: "NASA", color: "#57c7ff", weight: 0.12 },
        { id: "St.",  color: "#b07cff", weight: 0.08 },
      ];
      function pickAgency(r) {
        let acc = 0;
        for (const a of AGENCIES) { acc += a.weight; if (r < acc) return a; }
        return AGENCIES[0];
      }

      const nodes = [];
      function tooClose(x, y, list) {
        for (const n of list) {
          const dx = n.x - x, dy = n.y - y;
          if (dx * dx + dy * dy < 60 * 60) return true;
        }
        return false;
      }
      let attempts = 0;
      while (nodes.length < NODE_COUNT && attempts < 5000) {
        attempts++;
        const x = (rng() - 0.5) * FIELD_W;
        const y = (rng() - 0.5) * FIELD_H;
        if (tooClose(x, y, nodes)) continue;
        const u = rng();
        const year = 1947 + Math.round(u * u * 79);
        nodes.push({
          i: nodes.length, x, y,
          forceX: x, forceY: y,
          r: 7 + rng() * 5,  // slightly larger for vertical mobile readability
          agency: pickAgency(rng()),
          year,
        });
      }

      // Radial: focus node center, two rings around it
      const center = nodes[0];
      nodes.forEach((n, i) => {
        if (i === 0) {
          n.radialX = 0; n.radialY = 0;
        } else {
          const inner = i <= 15;
          const ringSize = inner ? 15 : 14;
          const idx = inner ? i - 1 : i - 16;
          const angle = (idx / ringSize) * Math.PI * 2 - Math.PI / 2;
          const radius = inner ? 220 : 360;
          n.radialX = Math.cos(angle) * radius;
          n.radialY = Math.sin(angle) * radius;
        }
      });

      // Chronological: x = year (within 880px), y = agency band
      const minY = 1947, maxY = 2026;
      const W = 860, H = 600;
      const agencyOrder = AGENCIES.map(a => a.id);
      const bandH = H / agencyOrder.length;
      nodes.forEach(n => {
        const xNorm = (n.year - minY) / (maxY - minY);
        n.chronoX = (xNorm - 0.5) * W;
        const bandIdx = agencyOrder.indexOf(n.agency.id);
        const jitter = ((n.i * 37) % 17) - 8;
        n.chronoY = (bandIdx * bandH) - H / 2 + bandH / 2 + jitter * 1.2;
      });

      // Edges (k-nearest)
      const edges = [];
      const edgeSet = new Set();
      function edgeKey(a, b) { return a < b ? `${a}|${b}` : `${b}|${a}`; }
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        const distances = [];
        for (let j = 0; j < nodes.length; j++) {
          if (j === i) continue;
          const dx = a.x - nodes[j].x, dy = a.y - nodes[j].y;
          distances.push({ j, d: dx * dx + dy * dy });
        }
        distances.sort((p, q) => p.d - q.d);
        for (let n = 0; n < 3 && n < distances.length; n++) {
          const j = distances[n].j;
          const key = edgeKey(i, j);
          if (edgeSet.has(key)) continue;
          edgeSet.add(key);
          edges.push({ a: i, b: j });
        }
      }

      const gEdges = document.getElementById("g-edges");
      let edgesHTML = "";
      for (let e = 0; e < edges.length; e++) {
        const a = nodes[edges[e].a], b = nodes[edges[e].b];
        edgesHTML += `<line class="edge" data-i="${e}" data-a="${a.i}" data-b="${b.i}" x1="${a.forceX.toFixed(1)}" y1="${a.forceY.toFixed(1)}" x2="${b.forceX.toFixed(1)}" y2="${b.forceY.toFixed(1)}"/>`;
      }
      gEdges.innerHTML = edgesHTML;

      const gNodes = document.getElementById("g-nodes");
      let nodesHTML = "";
      for (const n of nodes) {
        nodesHTML += `<circle class="node" data-i="${n.i}" cx="${n.forceX.toFixed(1)}" cy="${n.forceY.toFixed(1)}" r="${n.r.toFixed(1)}" fill="${n.agency.color}" />`;
      }
      gNodes.innerHTML = nodesHTML;

      // Year ruler — vertical layout: shorter axis but same idea
      const ruler = document.getElementById("year-ruler");
      let rulerHTML = "";
      for (let y = 1950; y <= 2020; y += 10) {
        const xNorm = (y - minY) / (maxY - minY);
        const xPx = (xNorm - 0.5) * W;
        rulerHTML += `<line x1="${xPx}" y1="-360" x2="${xPx}" y2="340"/>`;
        rulerHTML += `<text x="${xPx}" y="380" text-anchor="middle">${y}</text>`;
      }
      AGENCIES.forEach((a, idx) => {
        const yPx = (idx * bandH) - H / 2 + bandH / 2;
        rulerHTML += `<text x="-470" y="${yPx + 8}" text-anchor="start" fill="${a.color}">${a.id}</text>`;
      });
      ruler.innerHTML = rulerHTML;

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from(".s1-eyebrow", { y: -20, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.15);
      tl.from(".s1-title",   { y: 30, opacity: 0, duration: 0.7, ease: "back.out(1.3)" }, 0.4);
      tl.from(".s1-tagline", { y: 16, opacity: 0, duration: 0.55, ease: "power2.out" }, 0.9);
      tl.to("#scene-1", { opacity: 0, filter: "blur(12px)", duration: 0.25, ease: "power2.in" }, 2.45);

      tl.fromTo("#scene-2",
        { opacity: 0, filter: "blur(8px)" },
        { opacity: 1, filter: "blur(0px)", duration: 0.4, ease: "power2.out" },
        2.5
      );
      tl.from(".layout-pill-row", { y: -16, opacity: 0, duration: 0.5, ease: "power3.out" }, 2.7);
      tl.to("#pill-force", { className: "layout-pill active", duration: 0 }, 2.7);
      tl.to(".edge", {
        opacity: 0.18, duration: 0.5, ease: "power1.in",
        stagger: { amount: 0.4, from: "center" },
      }, 2.85);
      tl.to(".node", {
        opacity: 1, duration: 0.35, ease: "back.out(1.6)",
        stagger: { amount: 0.9, from: "random" },
      }, 3.05);
      tl.from("#s2-headline", { y: 18, opacity: 0, duration: 0.45, ease: "power2.out" }, 4.3);
      tl.from("#s2-sub",      { y: 14, opacity: 0, duration: 0.45, ease: "power2.out" }, 4.5);

      const T_FORCE = 5.4;
      const T_RADIAL = 8.0;

      function tweenLayoutTo(prop, t, dur, ease) {
        nodes.forEach(n => {
          tl.to(`.node[data-i="${n.i}"]`, {
            attr: { cx: n[prop + "X"], cy: n[prop + "Y"] },
            duration: dur, ease,
          }, t);
        });
        edges.forEach((e, idx) => {
          const a = nodes[e.a], b = nodes[e.b];
          tl.to(`.edge[data-i="${idx}"]`, {
            attr: {
              x1: a[prop + "X"], y1: a[prop + "Y"],
              x2: b[prop + "X"], y2: b[prop + "Y"],
            },
            duration: dur, ease,
          }, t);
        });
      }

      // Force → Radial
      tl.to("#pill-force", { color: "#7c8aa1", borderColor: "#1f2937", backgroundColor: "transparent", duration: 0.2, ease: "power2.in", overwrite: "auto" }, T_FORCE);
      tl.to("#pill-radial", { color: "#57c7ff", borderColor: "#57c7ff", backgroundColor: "#0d1422", duration: 0.3, ease: "power2.out" }, T_FORCE);
      tl.to("#s2-headline", { opacity: 0, y: -16, duration: 0.3, ease: "power2.in", overwrite: "auto" }, T_FORCE - 0.2);
      tl.to("#s2-sub",      { opacity: 0, y: -8,  duration: 0.3, ease: "power2.in", overwrite: "auto" }, T_FORCE - 0.2);
      tl.set("#s2-headline", { textContent: "RADIAL" }, T_FORCE + 0.2);
      tl.set("#s2-sub",      { textContent: "Centered on focus node · neighbors arranged on rings" }, T_FORCE + 0.2);
      tl.to("#s2-headline", { opacity: 1, y: 0, duration: 0.3, ease: "power3.out" }, T_FORCE + 0.25);
      tl.to("#s2-sub",      { opacity: 1, y: 0, duration: 0.3, ease: "power3.out" }, T_FORCE + 0.35);
      tweenLayoutTo("radial", T_FORCE, 0.8, "power3.inOut");

      // Radial → Chronological
      tl.to("#pill-radial", { color: "#7c8aa1", borderColor: "#1f2937", backgroundColor: "transparent", duration: 0.2, ease: "power2.in", overwrite: "auto" }, T_RADIAL);
      tl.to("#pill-chrono", { color: "#57c7ff", borderColor: "#57c7ff", backgroundColor: "#0d1422", duration: 0.3, ease: "power2.out" }, T_RADIAL);
      tl.to("#s2-headline", { opacity: 0, y: -16, duration: 0.3, ease: "power2.in", overwrite: "auto" }, T_RADIAL - 0.2);
      tl.to("#s2-sub",      { opacity: 0, y: -8,  duration: 0.3, ease: "power2.in", overwrite: "auto" }, T_RADIAL - 0.2);
      tl.set("#s2-headline", { textContent: "CHRONOLOGICAL" }, T_RADIAL + 0.2);
      tl.set("#s2-sub",      { innerHTML: "x = year · y = agency · <span class='v'>1947</span> → <span class='v'>2026</span>" }, T_RADIAL + 0.2);
      tl.to("#s2-headline", { opacity: 1, y: 0, duration: 0.3, ease: "power3.out" }, T_RADIAL + 0.25);
      tl.to("#s2-sub",      { opacity: 1, y: 0, duration: 0.3, ease: "power3.out" }, T_RADIAL + 0.35);
      tweenLayoutTo("chrono", T_RADIAL, 0.8, "power3.inOut");
      tl.to("#year-ruler", { opacity: 1, duration: 0.5, ease: "power2.out" }, T_RADIAL + 0.4);

      tl.to("#scene-2", { opacity: 0, filter: "blur(14px)", duration: 0.3, ease: "power2.in" }, 11.7);

      tl.fromTo("#scene-3",
        { opacity: 0, filter: "blur(10px)" },
        { opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "power3.out" },
        11.8
      );
      tl.from(".s3-url", { y: 28, opacity: 0, duration: 0.6, ease: "back.out(1.2)" }, 12.0);
      tl.to("#s3-underline", { scaleX: 1, duration: 0.7, ease: "expo.out" }, 12.5);
      tl.from(".s3-route", { y: 14, opacity: 0, duration: 0.45, ease: "power2.out" }, 12.7);
      tl.from(".s3-tag", { opacity: 0, letterSpacing: "0.4em", duration: 0.7, ease: "power3.out" }, 13.2);
      tl.to("#scene-3", { opacity: 0.85, duration: 0.5, ease: "power2.inOut" }, 14.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
